<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Control Total</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#111;
  --panel-2:#151515;
  --border:#222;
  --border-2:#2b2b2b;
  --text:#eaeaea;
  --muted:#999;
  --gold:#d4af37;
  --danger:#b83a3a;
  --success:#24b36b;
  --info:#4c8bf5;
  --warning:#d39e00;
  --radius:14px;
  --shadow:0 0 0 1px #1c1c1c;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:Inter,system-ui,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

body{
  overflow:hidden;
}

/* HEADER */
header{
  height:64px;
  padding:0 16px;
  background:#111;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  position:sticky;
  top:0;
  z-index:100;
}

.header-left{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}

.brand{
  font-size:18px;
  font-weight:900;
  color:var(--gold);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.menu-btn{
  display:none;
  background:#1a1a1a;
  color:#fff;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
  font-weight:800;
}

.logout{
  background:var(--danger);
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  font-weight:800;
}

/* LAYOUT */
.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  height:calc(100vh - 64px);
  min-height:0;
}

/* SIDEBAR */
.sidebar{
  border-right:1px solid var(--border);
  overflow:auto;
  background:#0d0d0d;
  min-height:0;
}

.sidebar-top{
  position:sticky;
  top:0;
  z-index:10;
  background:#0d0d0d;
  border-bottom:1px solid var(--border);
  padding:14px;
}

.search{
  width:100%;
  background:#151515;
  color:#fff;
  border:1px solid var(--border-2);
  padding:12px 12px;
  border-radius:12px;
  outline:none;
}

.users-wrap{
  padding:0;
}

.user-item{
  padding:14px 14px;
  cursor:pointer;
  border-bottom:1px solid #191919;
  transition:.18s ease;
}

.user-item:hover{
  background:#151515;
}

.user-name{
  font-size:14px;
  font-weight:800;
  margin-bottom:4px;
  word-break:break-word;
}

.user-meta{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:12px;
  color:var(--muted);
  flex-wrap:wrap;
}

.user-email{
  font-size:12px;
  color:#bdbdbd;
  word-break:break-word;
}

/* MAIN */
.main{
  padding:18px;
  overflow:auto;
  min-width:0;
  min-height:0;
}

.page-shell{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
}

.card-title{
  font-size:15px;
  font-weight:900;
  color:var(--gold);
  margin-bottom:14px;
}

.profile-head{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  flex-wrap:wrap;
}

.profile-head h2{
  margin:0 0 8px 0;
  font-size:22px;
  line-height:1.2;
  word-break:break-word;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.balance-box{
  font-size:32px;
  font-weight:900;
  color:var(--gold);
  line-height:1;
  text-align:right;
}

.balance-label{
  font-size:12px;
  color:var(--muted);
  text-align:right;
  margin-top:4px;
}

.info-list{
  display:grid;
  gap:10px;
}

.info-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  padding:10px 12px;
  background:#141414;
  border:1px solid #202020;
  border-radius:12px;
}

.info-label{
  color:#a3a3a3;
}

.info-value{
  color:#fff;
  word-break:break-word;
  text-align:right;
}

/* FORM */
.form-group{
  margin-bottom:14px;
}

label{
  display:block;
  margin-bottom:8px;
  color:#aaa;
  font-size:13px;
}

input,select,button,textarea{
  width:100%;
  background:#0f0f0f;
  color:#fff;
  border:1px solid #333;
  padding:12px;
  border-radius:10px;
  outline:none;
  font-size:14px;
}

textarea{
  resize:vertical;
  min-height:90px;
}

button{
  cursor:pointer;
  font-weight:800;
  transition:.18s ease;
}

button:hover{
  transform:translateY(-1px);
}

.primary{
  background:var(--gold);
  color:#000;
  border:none;
}

.danger{
  background:var(--danger);
  border:none;
  color:#fff;
}

.success{
  background:var(--success);
  border:none;
  color:#fff;
}

.info{
  background:var(--info);
  border:none;
  color:#fff;
}

.warning{
  background:var(--warning);
  border:none;
  color:#000;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.center{
  text-align:center;
  color:#777;
  padding:34px 16px;
}

.loader{
  text-align:center;
  padding:26px 16px;
  color:#888;
}

.error{
  color:#ff6b6b;
  text-align:center;
  margin-top:20px;
  padding:16px;
}

.chart-box{
  height:430px;
  overflow:hidden;
  border-radius:12px;
  background:#101010;
  border:1px solid #202020;
}

.section-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.item{
  background:#141414;
  border:1px solid #242424;
  border-radius:12px;
  padding:14px;
}

.item-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.item-title{
  font-size:16px;
  font-weight:900;
}

.item-sub{
  color:#a3a3a3;
  font-size:12px;
  margin-top:4px;
}

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.03em;
  border:1px solid transparent;
}

.badge.pending{ background:#2b2408; color:#f3d46b; border-color:#5a4a14; }
.badge.approved{ background:#0b2a16; color:#5ef0a0; border-color:#1e5c37; }
.badge.rejected{ background:#2a0b0b; color:#ff8a8a; border-color:#5e1d1d; }
.badge.counter_offer{ background:#241c0b; color:#f5c96b; border-color:#6c5216; }
.badge.default{ background:#1b1b1b; color:#ccc; border-color:#333; }

.item-actions{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:12px;
}

.item-actions.three{
  grid-template-columns:repeat(3,1fr);
}

.detail{
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid #242424;
}

.msg{
  background:#0f0f0f;
  border:1px solid #242424;
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:8px;
}

.msg.admin{
  border-color:#5a4a14;
}

.msg.client{
  border-color:#234b7c;
}

.msg-meta{
  font-size:11px;
  color:#888;
  margin-bottom:4px;
}

.msg-text{
  font-size:14px;
  color:#e8e8e8;
  white-space:pre-wrap;
  word-break:break-word;
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.tab-btn{
  width:auto;
  padding:10px 14px;
  border-radius:999px;
  background:#151515;
  color:#ddd;
  border:1px solid #2a2a2a;
}

.tab-btn.active{
  background:var(--gold);
  color:#000;
  border-color:transparent;
}

.tab-panel{
  display:none;
}

.tab-panel.active{
  display:block;
}

.form-row{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* MOBILE */
.mobile-backdrop{
  display:none;
}

@media (max-width: 980px){
  body{ overflow:auto; }

  .menu-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .layout{
    grid-template-columns:1fr;
    height:auto;
    min-height:calc(100vh - 64px);
  }

  .sidebar{
    position:fixed;
    top:64px;
    left:-100%;
    width:min(320px, 88vw);
    height:calc(100vh - 64px);
    z-index:999;
    transition:left .25s ease;
    background:#0d0d0d;
  }

  .sidebar.active{
    left:0;
  }

  .mobile-backdrop{
    display:block;
    position:fixed;
    inset:64px 0 0 0;
    background:rgba(0,0,0,.45);
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
    z-index:998;
  }

  .mobile-backdrop.active{
    opacity:1;
    pointer-events:auto;
  }

  .main{
    padding:14px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .chart-box{
    height:360px;
  }

  .actions,
  .item-actions,
  .item-actions.three,
  .form-row{
    grid-template-columns:1fr;
  }

  .balance-box,
  .balance-label{
    text-align:left;
  }
}

@media (max-width: 520px){
  header{
    padding:0 12px;
  }

  .brand{
    font-size:16px;
  }

  .logout{
    padding:9px 12px;
  }

  .main{
    padding:12px;
  }

  .card{
    padding:14px;
    border-radius:12px;
  }

  .chart-box{
    height:320px;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <span class="brand">🧑‍💼 PANEL ADMINISTRACIÓN</span>
  </div>
  <button class="logout" onclick="logout()">Cerrar sesión</button>
</header>

<div class="mobile-backdrop" id="backdrop" onclick="closeSidebar()"></div>

<div class="layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <input
        type="text"
        class="search"
        id="searchUsers"
        placeholder="Buscar usuario..."
        oninput="filterUsers(this.value)"
      />
    </div>

    <div class="users-wrap" id="usersList">
      <div class="loader">Cargando usuarios...</div>
    </div>
  </aside>

  <main class="main" id="profilePanel">
    <div class="center">Selecciona un usuario</div>
  </main>

</div>

<script>
/* ================= API ================= */
const API = `${location.origin}/api`;

/* ================= TOKEN ================= */
const token = localStorage.getItem("admin_token") || localStorage.getItem("token");

if (!token) {
  location.href = "login.html";
}

function authHeaders(extra = {}) {
  return {
    ...(token ? { Authorization: "Bearer " + token } : {}),
    ...extra
  };
}

/* ================= STATE ================= */
let currentUser = null;
let currentWithdraw = null;
let currentDocument = null;
let tvWidget = null;
let allUsers = [];
let allWithdraws = [];
let allDocuments = [];
let socket = null;

/* ================= SIDEBAR MOBILE ================= */
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const backdrop = document.getElementById("backdrop");
  sidebar.classList.toggle("active");
  backdrop.classList.toggle("active");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("backdrop").classList.remove("active");
}

window.addEventListener("resize", () => {
  if (window.innerWidth > 980) {
    closeSidebar();
  }
});

/* ================= HELPERS ================= */
function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, function(m) {
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m];
  });
}

function formatDate(value) {
  if (!value) return "—";
  const d = new Date(value);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleString();
}

function formatMoney(value) {
  const n = Number(value || 0);
  return n.toLocaleString("en-US", { maximumFractionDigits: 2, minimumFractionDigits: 0 });
}

function statusClass(status) {
  return String(status || "default").toLowerCase().replace(/\s+/g, "_");
}

function getUserId(u) {
  return u?._id || u?.id || "";
}

function getUserEmail(u) {
  return u?.email || u?.emailAddress || u?.correo || "sin-email";
}

function getUserName(u) {
  return u?.nombre || u?.name || u?.fullName || u?.firstName || "";
}

function getUserPhone(u) {
  return u?.telefono || u?.phone || u?.mobile || "";
}

function getUserAddress(u) {
  return u?.direccion || u?.address || "";
}

function extractArray(resp) {
  if (!resp) return [];
  if (Array.isArray(resp)) return resp;
  if (Array.isArray(resp.data)) return resp.data;
  if (Array.isArray(resp.withdraws)) return resp.withdraws;
  if (Array.isArray(resp.documents)) return resp.documents;
  if (Array.isArray(resp.users)) return resp.users;
  if (Array.isArray(resp.result)) return resp.result;
  return [];
}

function setTab(tabName) {
  const tabs = document.querySelectorAll(".tab-btn");
  const panels = document.querySelectorAll(".tab-panel");
  tabs.forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tabName));
  panels.forEach(p => p.classList.toggle("active", p.id === tabName));
}

async function apiFetch(url, options = {}) {
  try {
    const opt = {
      ...options,
      headers: authHeaders(options.headers || {})
    };

    if (options.body instanceof FormData) {
      delete opt.headers["Content-Type"];
    } else {
      opt.headers["Content-Type"] = opt.headers["Content-Type"] || "application/json";
    }

    const res = await fetch(url, opt);

    if (res.status === 401) {
      logout();
      return null;
    }

    if (res.status === 204) return {};

    let data;
    const ct = res.headers.get("content-type") || "";
    try {
      if (ct.includes("application/json")) data = await res.json();
      else data = await res.text();
    } catch {
      data = null;
    }

    if (!res.ok) {
      throw new Error(
        typeof data === "string"
          ? data
          : (data?.msg || data?.message || res.statusText || "Error")
      );
    }

    return data;
  } catch (e) {
    console.error("API error:", e);
    throw e;
  }
}

function toast(message) {
  alert(message);
}

/* ================= SOCKETS ================= */
function connectSocket() {
  try {
    socket = io({
      transports: ["websocket", "polling"],
      query: { role: "admin" }
    });

    socket.on("connect", () => {
      console.log("socket connected", socket.id);
      if (currentUser) {
        socket.emit("withdraw:join", { userId: getUserId(currentUser) });
      }
    });

    socket.on("admin:new-withdraw", (withdraw) => {
      if (currentUser && String(withdraw.userId) === String(getUserId(currentUser))) {
        loadWithdraws(getUserId(currentUser), false);
      }
      loadAllWithdraws(false);
    });

    socket.on("admin:withdraw-update", (withdraw) => {
      if (currentWithdraw && String(currentWithdraw._id) === String(withdraw._id)) {
        currentWithdraw = withdraw;
        renderWithdrawDetail(withdraw);
      }
      if (currentUser && String(withdraw.userId) === String(getUserId(currentUser))) {
        loadWithdraws(getUserId(currentUser), false);
      }
      loadAllWithdraws(false);
    });

    socket.on("withdraw:update", (withdraw) => {
      if (currentWithdraw && String(currentWithdraw._id) === String(withdraw._id)) {
        currentWithdraw = withdraw;
        renderWithdrawDetail(withdraw);
      }
      if (currentUser && String(withdraw.userId) === String(getUserId(currentUser))) {
        loadWithdraws(getUserId(currentUser), false);
      }
    });

    socket.on("document:uploaded", (payload) => {
      if (currentUser && String(payload.userId) === String(getUserId(currentUser))) {
        loadDocuments(getUserId(currentUser), false);
      }
    });

    socket.on("document:approved", (payload) => {
      if (currentDocument && String(currentDocument._id) === String(payload.id)) {
        loadDocuments(getUserId(currentUser), false);
      }
    });

    socket.on("document:rejected", (payload) => {
      if (currentDocument && String(currentDocument._id) === String(payload.id)) {
        loadDocuments(getUserId(currentUser), false);
      }
    });

    socket.on("disconnect", () => {
      console.log("socket disconnected");
    });
  } catch (e) {
    console.warn("socket init failed:", e);
  }
}

/* ================= USERS ================= */
async function loadUsers() {
  const list = document.getElementById("usersList");
  list.innerHTML = `<div class="loader">Cargando...</div>`;

  try {
    const resp = await apiFetch(API + "/admin/users");
    allUsers = extractArray(resp);
    renderUsers(allUsers);
  } catch (e) {
    list.innerHTML = `<div class="error">Error cargando usuarios</div>`;
  }
}

function renderUsers(users) {
  const list = document.getElementById("usersList");
  list.innerHTML = "";

  if (!users.length) {
    list.innerHTML = `<div class="center">No hay usuarios</div>`;
    return;
  }

  users.forEach(u => {
    const email = getUserEmail(u);
    const name = getUserName(u);
    const bal = typeof u.balance !== "undefined" ? u.balance : 0;
    const item = document.createElement("div");
    item.className = "user-item";

    item.innerHTML = `
      <div class="user-name">${escapeHtml(name || email)}</div>
      <div class="user-email">${escapeHtml(email)}</div>
      <div class="user-meta">
        <span>Saldo: ${escapeHtml(formatMoney(bal))}</span>
        <span>x${escapeHtml(String(typeof u.leverage !== "undefined" ? u.leverage : 1))}</span>
      </div>
    `;

    item.onclick = () => {
      openUser(u);
      if (window.innerWidth <= 980) closeSidebar();
    };

    list.appendChild(item);
  });
}

function filterUsers(text) {
  const t = String(text || "").toLowerCase().trim();
  if (!t) {
    renderUsers(allUsers);
    return;
  }

  const filtered = allUsers.filter(u => {
    const values = [
      getUserName(u),
      getUserEmail(u),
      getUserPhone(u),
      getUserAddress(u),
      String(u.balance ?? ""),
      String(u.leverage ?? ""),
      String(u.role ?? ""),
    ].join(" ").toLowerCase();

    return values.includes(t);
  });

  renderUsers(filtered);
}

/* ================= OPEN USER ================= */
function openUser(u) {
  currentUser = u;
  currentWithdraw = null;
  currentDocument = null;

  const userId = getUserId(u);
  const userEmail = getUserEmail(u);
  const userName = getUserName(u);
  const userPhone = getUserPhone(u);
  const userAddress = getUserAddress(u);
  const userBalance = typeof u.balance !== "undefined" ? u.balance : 0;
  const userLeverage = typeof u.leverage !== "undefined" ? u.leverage : 50;
  const userStatus = u.status || u.estado || "Activo";

  document.getElementById("profilePanel").innerHTML = `
    <div class="page-shell">

      <div class="card">
        <div class="profile-head">
          <div>
            <h2>${escapeHtml(userName || userEmail)}</h2>
            <div class="small">Correo: ${escapeHtml(userEmail)}</div>
            <div class="small">ID: ${escapeHtml(userId)}</div>
          </div>

          <div>
            <div class="balance-box">$${escapeHtml(formatMoney(userBalance))}</div>
            <div class="balance-label">Saldo actual</div>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-profile" onclick="setTab('tab-profile')">Perfil</button>
        <button class="tab-btn" data-tab="tab-withdraws" onclick="setTab('tab-withdraws')">Retiros</button>
        <button class="tab-btn" data-tab="tab-documents" onclick="setTab('tab-documents')">Documentos</button>
      </div>

      <div class="tab-panel active" id="tab-profile">
        <div class="grid">
          <div class="card">
            <div class="card-title">Información del Cliente</div>

            <div class="info-list">
              <div class="info-row">
                <span class="info-label">Nombre</span>
                <span class="info-value">${escapeHtml(userName || "N/A")}</span>
              </div>

              <div class="info-row">
                <span class="info-label">Correo</span>
                <span class="info-value">${escapeHtml(userEmail || "N/A")}</span>
              </div>

              <div class="info-row">
                <span class="info-label">Teléfono</span>
                <span class="info-value">${escapeHtml(userPhone || "N/A")}</span>
              </div>

              <div class="info-row">
                <span class="info-label">Dirección</span>
                <span class="info-value">${escapeHtml(userAddress || "N/A")}</span>
              </div>

              <div class="info-row">
                <span class="info-label">Estado</span>
                <span class="info-value">${escapeHtml(userStatus)}</span>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">Actualizar Saldo</div>

            <div class="form-group">
              <label for="balance">Nuevo saldo</label>
              <input id="balance" type="number" step="0.01" value="${escapeHtml(String(userBalance))}" />
            </div>

            <button class="primary" onclick="updateBalance()">Guardar saldo</button>
          </div>

          <div class="card">
            <div class="card-title">Apalancamiento</div>

            <div class="form-group">
              <label for="leverage">Escribe una cantidad entre 50 y 100000</label>
              <input
                id="leverage"
                type="number"
                min="50"
                max="100000"
                step="1"
                value="${escapeHtml(String(userLeverage))}"
              />
            </div>

            <button class="primary" onclick="updateLeverage()">Guardar apalancamiento</button>
          </div>
        </div>

        <div style="height:16px"></div>

        <div class="card">
          <div class="card-title">Gráfico</div>

          <div class="form-group">
            <label for="symbolInput">Símbolo gráfico</label>
            <input id="symbolInput" value="BINANCE:BTCUSDT" />
          </div>

          <button class="primary" onclick="loadChart()">Cargar gráfico</button>

          <div style="height:14px"></div>
          <div id="tv_chart" class="chart-box"></div>
        </div>
      </div>

      <div class="tab-panel" id="tab-withdraws">
        <div class="card">
          <div class="card-title">Retiros del Cliente</div>
          <div id="withdraws"><div class="loader">Cargando retiros...</div></div>
        </div>

        <div style="height:16px"></div>

        <div class="card">
          <div class="card-title">Detalle del Retiro</div>
          <div id="withdrawDetail" class="center">Selecciona un retiro</div>
        </div>
      </div>

      <div class="tab-panel" id="tab-documents">
        <div class="card">
          <div class="card-title">Documentos del Cliente</div>
          <div id="documents"><div class="loader">Cargando documentos...</div></div>
        </div>

        <div style="height:16px"></div>

        <div class="card">
          <div class="card-title">Detalle del Documento</div>
          <div id="documentDetail" class="center">Selecciona un documento</div>
        </div>

        <div style="height:16px"></div>

        <div class="card">
          <div class="card-title">Subir Documento</div>

          <div class="form-row">
            <div class="form-group">
              <label for="docType">Tipo</label>
              <select id="docType">
                <option value="id">ID / Cédula</option>
                <option value="passport">Pasaporte</option>
                <option value="selfie">Selfie</option>
                <option value="address">Comprobante de domicilio</option>
                <option value="bank">Estado bancario</option>
                <option value="other">Otro</option>
              </select>
            </div>

            <div class="form-group">
              <label for="docFile">Archivo</label>
              <input id="docFile" type="file" accept=".jpg,.jpeg,.png,.pdf" />
            </div>
          </div>

          <button class="primary" onclick="uploadDocumentForUser()">Subir documento</button>
        </div>
      </div>
    </div>
  `;

  loadWithdraws(userId);
  loadDocuments(userId);
  setTimeout(loadChart, 300);

  if (socket) {
    socket.emit("withdraw:join", { userId });
  }
}

/* ================= TRADINGVIEW ================= */
function loadChart() {
  const symbolEl = document.getElementById("symbolInput");
  if (!symbolEl) return;

  const symbol = symbolEl.value || "BINANCE:BTCUSDT";

  try {
    if (tvWidget && typeof tvWidget.remove === "function") {
      tvWidget.remove();
    }
  } catch (e) {}

  try {
    tvWidget = new TradingView.widget({
      container_id: "tv_chart",
      symbol,
      interval: "15",
      timezone: "Etc/UTC",
      theme: "dark",
      style: "1",
      locale: "es",
      toolbar_bg: "#111",
      enable_publishing: false,
      allow_symbol_change: true,
      height: 430
    });
  } catch (err) {
    console.warn("TradingView init failed:", err);
    const chartBox = document.getElementById("tv_chart");
    if (chartBox) chartBox.innerHTML = `<div class="center">No se pudo cargar el gráfico</div>`;
  }
}

/* ================= UPDATE BALANCE ================= */
async function updateBalance() {
  if (!currentUser) return;

  const balance = document.getElementById("balance").value;

  try {
    await apiFetch(API + "/admin/update-balance", {
      method: "POST",
      body: JSON.stringify({
        userId: getUserId(currentUser),
        balance
      })
    });

    await loadUsers();
    const refreshed = allUsers.find(u => String(getUserId(u)) === String(getUserId(currentUser))) || currentUser;
    openUser(refreshed);
    toast("Saldo actualizado");
  } catch (e) {
    toast("Error actualizando saldo");
  }
}

/* ================= UPDATE LEVERAGE ================= */
async function updateLeverage() {
  if (!currentUser) return;

  const leverage = Number(document.getElementById("leverage").value);

  if (Number.isNaN(leverage) || leverage < 50 || leverage > 100000) {
    alert("El apalancamiento debe estar entre 50 y 100000.");
    return;
  }

  try {
    await apiFetch(API + "/admin/update-leverage", {
      method: "POST",
      body: JSON.stringify({
        userId: getUserId(currentUser),
        leverage
      })
    });

    await loadUsers();
    const refreshed = allUsers.find(u => String(getUserId(u)) === String(getUserId(currentUser))) || currentUser;
    openUser(refreshed);
    toast("Apalancamiento actualizado");
  } catch (e) {
    toast("Error actualizando apalancamiento");
  }
}

/* ================= WITHDRAWALS ================= */
async function loadWithdraws(userId, render = true) {
  if (!userId) return [];

  try {
    const data = await apiFetch(API + "/admin/withdraws/" + encodeURIComponent(userId));
    const list = extractArray(data);
    allWithdraws = list || [];
    if (render) renderWithdrawList(allWithdraws);
    return allWithdraws;
  } catch (e) {
    if (render) {
      const box = document.getElementById("withdraws");
      if (box) box.innerHTML = `<div class="error">Error cargando retiros</div>`;
    }
    return [];
  }
}

async function loadAllWithdraws(render = true) {
  try {
    const data = await apiFetch(API + "/admin/withdraws");
    const list = extractArray(data);
    allWithdraws = list || [];
    if (render && currentUser) renderWithdrawList(allWithdraws.filter(w => String(w.userId) === String(getUserId(currentUser))));
    return allWithdraws;
  } catch (e) {
    return [];
  }
}

function renderWithdrawList(list) {
  const box = document.getElementById("withdraws");
  if (!box) return;

  box.innerHTML = "";

  if (!list || !list.length) {
    box.innerHTML = `<div class="small">Sin solicitudes</div>`;
    return;
  }

  list.forEach(w => {
    const div = document.createElement("div");
    div.className = "item";
    div.style.cursor = "pointer";

    const badge = escapeHtml(String(w.status || "default"));
    const method = escapeHtml(w.method || "N/A");
    const amount = escapeHtml(formatMoney(w.amount || 0));
    const title = `#${escapeHtml(String(w._id || ""))}`;

    div.innerHTML = `
      <div class="item-head">
        <div>
          <div class="item-title">$${amount}</div>
          <div class="item-sub">${title} · Método: ${method} · ${escapeHtml(formatDate(w.createdAt))}</div>
        </div>
        <span class="badge ${statusClass(w.status)}">${badge}</span>
      </div>
      <div class="small">
        Wallet: ${escapeHtml(w.walletAddress || "—")}<br/>
        Banco: ${escapeHtml(w.bankName || "—")}<br/>
        Cuenta: ${escapeHtml(w.accountNumber || "—")}
      </div>
    `;

    div.onclick = () => openWithdrawDetail(w);
    box.appendChild(div);
  });
}

async function openWithdrawDetail(withdraw) {
  currentWithdraw = withdraw;
  if (!withdraw) return;

  const box = document.getElementById("withdrawDetail");
  if (!box) return;

  const msgs = Array.isArray(withdraw.messages) ? withdraw.messages : [];
  const messagesHtml = msgs.length
    ? msgs.map(m => `
        <div class="msg ${escapeHtml(String(m.sender || ""))}">
          <div class="msg-meta">${escapeHtml(String(m.sender || "—"))} · ${escapeHtml(formatDate(m.createdAt))}</div>
          <div class="msg-text">${escapeHtml(m.message || "")}</div>
        </div>
      `).join("")
    : `<div class="small">No hay mensajes aún</div>`;

  box.innerHTML = `
    <div class="item">
      <div class="item-head">
        <div>
          <div class="item-title">$${escapeHtml(formatMoney(withdraw.amount || 0))}</div>
          <div class="item-sub">
            ID: ${escapeHtml(withdraw._id || "")}<br/>
            Usuario: ${escapeHtml(withdraw.userId || "")}<br/>
            Método: ${escapeHtml(withdraw.method || "—")}<br/>
            Wallet: ${escapeHtml(withdraw.walletAddress || "—")}<br/>
            Banco: ${escapeHtml(withdraw.bankName || "—")}<br/>
            Cuenta: ${escapeHtml(withdraw.accountNumber || "—")}
          </div>
        </div>
        <span class="badge ${statusClass(withdraw.status)}">${escapeHtml(withdraw.status || "default")}</span>
      </div>

      <div class="detail">
        <div class="small"><strong>Nota del cliente:</strong> ${escapeHtml(withdraw.note || "—")}</div>
        <div class="small"><strong>Nota admin:</strong> ${escapeHtml(withdraw.adminNote || "—")}</div>
        <div class="small"><strong>Monto ofrecido:</strong> $${escapeHtml(formatMoney(withdraw.offerAmount || 0))}</div>
        <div class="small"><strong>Procesado por:</strong> ${escapeHtml(withdraw.processedBy || "—")}</div>
        <div class="small"><strong>Procesado at:</strong> ${escapeHtml(formatDate(withdraw.processedAt))}</div>
      </div>

      <div style="height:12px"></div>

      <div class="card-title" style="margin-bottom:10px;">Mensajes</div>
      <div>${messagesHtml}</div>

      <div style="height:12px"></div>

      <div class="form-group">
        <label for="withdrawMessage">Nuevo mensaje admin</label>
        <textarea id="withdrawMessage" placeholder="Escribe un mensaje para el cliente..."></textarea>
      </div>

      <div class="actions">
        <button class="info" onclick="sendWithdrawMessage('${withdraw._id || ""}')">Enviar mensaje</button>
        <button class="warning" onclick="approveWithdraw('${withdraw._id || ""}')">Aprobar</button>
      </div>

      <div style="height:10px"></div>

      <div class="form-row">
        <div class="form-group">
          <label for="counterAmount">Contraoferta</label>
          <input id="counterAmount" type="number" step="0.01" placeholder="0.00" value="${escapeHtml(String(withdraw.offerAmount || 0))}" />
        </div>
        <div class="form-group">
          <label for="counterNote">Nota de contraoferta</label>
          <input id="counterNote" type="text" placeholder="Explica la contraoferta..." value="${escapeHtml(withdraw.adminNote || "")}" />
        </div>
      </div>

      <div class="actions three">
        <button class="primary" onclick="sendCounterOffer('${withdraw._id || ""}')">Enviar contraoferta</button>
        <button class="success" onclick="acceptOfferAsAdmin('${withdraw._id || ""}')">Marcar oferta aceptada</button>
        <button class="danger" onclick="rejectWithdraw('${withdraw._id || ""}')">Rechazar</button>
      </div>
    </div>
  `;

  if (currentUser) {
    loadWithdraws(getUserId(currentUser));
  }
}

async function sendWithdrawMessage(id) {
  const message = document.getElementById("withdrawMessage")?.value || "";
  if (!message.trim()) {
    alert("Escribe un mensaje");
    return;
  }

  try {
    await apiFetch(API + "/admin/withdraw/message", {
      method: "POST",
      body: JSON.stringify({ id, message })
    });

    if (currentUser) await loadWithdraws(getUserId(currentUser), true);
    if (currentWithdraw && String(currentWithdraw._id) === String(id)) {
      const refreshed = allWithdraws.find(w => String(w._id) === String(id));
      if (refreshed) openWithdrawDetail(refreshed);
    }
    toast("Mensaje enviado");
  } catch (e) {
    toast("Error enviando mensaje");
  }
}

async function sendCounterOffer(id) {
  const offerAmount = Number(document.getElementById("counterAmount")?.value || 0);
  const adminNote = document.getElementById("counterNote")?.value || "";

  if (!Number.isFinite(offerAmount) || offerAmount < 0) {
    alert("Monto inválido");
    return;
  }

  try {
    await apiFetch(API + "/admin/withdraw/counter", {
      method: "POST",
      body: JSON.stringify({
        id,
        offerAmount,
        adminNote
      })
    });

    if (currentUser) await loadWithdraws(getUserId(currentUser), true);
    if (currentWithdraw && String(currentWithdraw._id) === String(id)) {
      const refreshed = allWithdraws.find(w => String(w._id) === String(id));
      if (refreshed) openWithdrawDetail(refreshed);
    }
    toast("Contraoferta enviada");
  } catch (e) {
    toast("Error creando contraoferta");
  }
}

async function acceptOfferAsAdmin(id) {
  try {
    const w = allWithdraws.find(x => String(x._id) === String(id));
    if (!w) return;

    const result = await apiFetch(API + "/withdraw/accept-offer", {
      method: "POST",
      body: JSON.stringify({ id })
    });

    if (result) {
      if (currentUser) await loadWithdraws(getUserId(currentUser), true);
      const refreshed = allWithdraws.find(w => String(w._id) === String(id));
      if (refreshed) openWithdrawDetail(refreshed);
      toast("Oferta marcada como aceptada");
    }
  } catch (e) {
    toast("Error aceptando oferta");
  }
}

async function approveWithdraw(id) {
  if (!id) return;

  const adminNote = prompt("Nota de aprobación (opcional):", "") || "";

  try {
    await apiFetch(API + "/admin/withdraw/approve", {
      method: "POST",
      body: JSON.stringify({ id, adminNote })
    });

    if (currentUser) await loadWithdraws(getUserId(currentUser), true);
    const refreshed = allWithdraws.find(w => String(w._id) === String(id));
    if (refreshed) openWithdrawDetail(refreshed);
    toast("Retiro aprobado");
  } catch (e) {
    toast("Error aprobando retiro");
  }
}

async function rejectWithdraw(id) {
  if (!id) return;

  const adminNote = prompt("Motivo del rechazo (opcional):", "") || "";

  try {
    await apiFetch(API + "/admin/withdraw/reject", {
      method: "POST",
      body: JSON.stringify({ id, adminNote })
    });

    if (currentUser) await loadWithdraws(getUserId(currentUser), true);
    const refreshed = allWithdraws.find(w => String(w._id) === String(id));
    if (refreshed) openWithdrawDetail(refreshed);
    toast("Retiro rechazado");
  } catch (e) {
    toast("Error rechazando retiro");
  }
}

/* ================= DOCUMENTS ================= */
async function loadDocuments(userId, render = true) {
  if (!userId) return [];

  try {
    const data = await apiFetch(API + "/admin/documents/" + encodeURIComponent(userId));
    const list = extractArray(data);
    allDocuments = list || [];
    if (render) renderDocumentList(allDocuments);
    return allDocuments;
  } catch (e) {
    if (render) {
      const box = document.getElementById("documents");
      if (box) box.innerHTML = `<div class="error">Error cargando documentos</div>`;
    }
    return [];
  }
}

function renderDocumentList(list) {
  const box = document.getElementById("documents");
  if (!box) return;

  box.innerHTML = "";

  if (!list || !list.length) {
    box.innerHTML = `<div class="small">Sin documentos</div>`;
    return;
  }

  list.forEach(doc => {
    const div = document.createElement("div");
    div.className = "item";
    div.style.cursor = "pointer";

    const badge = escapeHtml(String(doc.status || "default"));
    const type = escapeHtml(doc.type || "N/A");
    const title = `#${escapeHtml(String(doc._id || ""))}`;

    div.innerHTML = `
      <div class="item-head">
        <div>
          <div class="item-title">${type}</div>
          <div class="item-sub">${title} · ${escapeHtml(doc.originalName || doc.filename || "archivo")} · ${escapeHtml(formatDate(doc.createdAt))}</div>
        </div>
        <span class="badge ${statusClass(doc.status)}">${badge}</span>
      </div>
      <div class="small">
        MIME: ${escapeHtml(doc.mimeType || "—")}<br/>
        Tamaño: ${escapeHtml(String(Math.round((doc.size || 0) / 1024)))} KB
      </div>
    `;

    div.onclick = () => openDocumentDetail(doc);
    box.appendChild(div);
  });
}

function openDocumentDetail(doc) {
  currentDocument = doc;
  if (!doc) return;

  const box = document.getElementById("documentDetail");
  if (!box) return;

  const fileUrl = doc.path || doc.url || "";
  box.innerHTML = `
    <div class="item">
      <div class="item-head">
        <div>
          <div class="item-title">${escapeHtml(doc.type || "documento")}</div>
          <div class="item-sub">
            ID: ${escapeHtml(doc._id || "")}<br/>
            Usuario: ${escapeHtml(doc.userId || "")}<br/>
            Nombre: ${escapeHtml(doc.originalName || doc.filename || "archivo")}<br/>
            Creado: ${escapeHtml(formatDate(doc.createdAt))}
          </div>
        </div>
        <span class="badge ${statusClass(doc.status)}">${escapeHtml(doc.status || "default")}</span>
      </div>

      <div class="detail">
        <div class="small"><strong>Admin note:</strong> ${escapeHtml(doc.adminNote || "—")}</div>
        <div class="small"><strong>Archivo:</strong> ${fileUrl ? `<a href="${escapeHtml(fileUrl)}" target="_blank" style="color:#d4af37;">Abrir archivo</a>` : "—"}</div>
        <div class="small"><strong>MIME:</strong> ${escapeHtml(doc.mimeType || "—")}</div>
        <div class="small"><strong>Tamaño:</strong> ${escapeHtml(String(doc.size || 0))} bytes</div>
      </div>

      <div style="height:12px"></div>

      <div class="form-group">
        <label for="docAdminNote">Nota admin</label>
        <textarea id="docAdminNote" placeholder="Escribe una nota sobre el documento...">${escapeHtml(doc.adminNote || "")}</textarea>
      </div>

      <div class="item-actions">
        <button class="success" onclick="approveDocument('${doc._id || ""}')">Aprobar</button>
        <button class="danger" onclick="rejectDocument('${doc._id || ""}')">Rechazar</button>
      </div>
    </div>
  `;
}

async function approveDocument(id) {
  const note = document.getElementById("docAdminNote")?.value || "";
  try {
    await apiFetch(API + "/admin/document/approve", {
      method: "POST",
      body: JSON.stringify({ id, note })
    });

    if (currentUser) await loadDocuments(getUserId(currentUser), true);
    const refreshed = allDocuments.find(d => String(d._id) === String(id));
    if (refreshed) openDocumentDetail({ ...refreshed, adminNote: note, status: "approved" });
    toast("Documento aprobado");
  } catch (e) {
    toast("Error aprobando documento");
  }
}

async function rejectDocument(id) {
  const note = document.getElementById("docAdminNote")?.value || "";
  try {
    await apiFetch(API + "/admin/document/reject", {
      method: "POST",
      body: JSON.stringify({ id, note })
    });

    if (currentUser) await loadDocuments(getUserId(currentUser), true);
    const refreshed = allDocuments.find(d => String(d._id) === String(id));
    if (refreshed) openDocumentDetail({ ...refreshed, adminNote: note, status: "rejected" });
    toast("Documento rechazado");
  } catch (e) {
    toast("Error rechazando documento");
  }
}

async function uploadDocumentForUser() {
  if (!currentUser) return alert("Selecciona un usuario primero");

  const file = document.getElementById("docFile")?.files?.[0];
  const type = document.getElementById("docType")?.value || "other";

  if (!file) {
    alert("Selecciona un archivo");
    return;
  }

  const fd = new FormData();
  fd.append("userId", getUserId(currentUser));
  fd.append("type", type);
  fd.append("document", file);

  try {
    await apiFetch(API + "/upload-document", {
      method: "POST",
      body: fd
    });

    await loadDocuments(getUserId(currentUser), true);
    toast("Documento subido");
  } catch (e) {
    toast("Error subiendo documento");
  }
}

/* ================= LOAD ALL WITH FILTER FOR CURRENT USER ================= */
async function refreshCurrentData() {
  if (!currentUser) return;
  await loadWithdraws(getUserId(currentUser), true);
  await loadDocuments(getUserId(currentUser), true);
}

/* ================= LOGOUT ================= */
function logout() {
  localStorage.removeItem("admin_token");
  localStorage.removeItem("token");
  location.href = "login.html";
}

/* ================= INIT ================= */
connectSocket();
loadUsers();
</script>
