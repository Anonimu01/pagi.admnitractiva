<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Control Total</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root{
  --bg:#0b0b0b;
  --panel:#111;
  --panel-2:#151515;
  --border:#222;
  --border-2:#2b2b2b;
  --text:#eaeaea;
  --muted:#999;
  --gold:#d4af37;
  --danger:#b83a3a;
  --success:#24b36b;
  --info:#4c8bf5;
  --warning:#d39e00;
  --radius:14px;
  --shadow:0 0 0 1px #1c1c1c;
}

*{ box-sizing:border-box; }
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:Inter,system-ui,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
body{ overflow:hidden; }

a{ color:var(--gold); text-decoration:none; }
a:hover{ text-decoration:underline; }

header{
  height:64px;
  padding:0 16px;
  background:#111;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  position:sticky;
  top:0;
  z-index:100;
}
.header-left{ display:flex; align-items:center; gap:12px; min-width:0; }
.brand{
  font-size:18px;
  font-weight:900;
  color:var(--gold);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.menu-btn{
  display:none;
  background:#1a1a1a;
  color:#fff;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
  font-weight:800;
}
.logout{
  background:var(--danger);
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  font-weight:800;
}
.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  height:calc(100vh - 64px);
  min-height:0;
}
.sidebar{
  border-right:1px solid var(--border);
  overflow:auto;
  background:#0d0d0d;
  min-height:0;
}
.sidebar-top{
  position:sticky;
  top:0;
  z-index:10;
  background:#0d0d0d;
  border-bottom:1px solid var(--border);
  padding:14px;
}
.search{
  width:100%;
  background:#151515;
  color:#fff;
  border:1px solid var(--border-2);
  padding:12px 12px;
  border-radius:12px;
  outline:none;
}
.users-wrap{ padding:0; }
.user-item{
  padding:14px 14px;
  cursor:pointer;
  border-bottom:1px solid #191919;
  transition:.18s ease;
}
.user-item:hover{ background:#151515; }
.user-name{ font-size:14px; font-weight:800; margin-bottom:4px; word-break:break-word; }
.user-meta{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:12px;
  color:var(--muted);
  flex-wrap:wrap;
}
.user-email{ font-size:12px; color:#bdbdbd; word-break:break-word; }
.main{ padding:18px; overflow:auto; min-width:0; min-height:0; }
.page-shell{ display:flex; flex-direction:column; gap:18px; }
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
}
.card-title{
  font-size:15px;
  font-weight:900;
  color:var(--gold);
  margin-bottom:14px;
}
.profile-head{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  flex-wrap:wrap;
}
.profile-head h2{
  margin:0 0 8px 0;
  font-size:22px;
  line-height:1.2;
  word-break:break-word;
}
.small{ font-size:12px; color:var(--muted); }
.balance-box{
  font-size:32px;
  font-weight:900;
  color:var(--gold);
  line-height:1;
  text-align:right;
}
.balance-label{ font-size:12px; color:var(--muted); text-align:right; margin-top:4px; }
.info-list{ display:grid; gap:10px; }
.info-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  padding:10px 12px;
  background:#141414;
  border:1px solid #202020;
  border-radius:12px;
}
.info-label{ color:#a3a3a3; }
.info-value{ color:#fff; word-break:break-word; text-align:right; }
.form-group{ margin-bottom:14px; }
label{ display:block; margin-bottom:8px; color:#aaa; font-size:13px; }
input,select,button,textarea{
  width:100%;
  background:#0f0f0f;
  color:#fff;
  border:1px solid #333;
  padding:12px;
  border-radius:10px;
  outline:none;
  font-size:14px;
}
textarea{ resize:vertical; min-height:90px; }
button{ cursor:pointer; font-weight:800; transition:.18s ease; }
button:hover{ transform:translateY(-1px); }
.primary{ background:var(--gold); color:#000; border:none; }
.danger{ background:var(--danger); border:none; color:#fff; }
.success{ background:var(--success); border:none; color:#fff; }
.info{ background:var(--info); border:none; color:#fff; }
.warning{ background:var(--warning); border:none; color:#000; }
.actions{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.center{ text-align:center; color:#777; padding:34px 16px; }
.loader{ text-align:center; padding:26px 16px; color:#888; }
.error{ color:#ff6b6b; text-align:center; margin-top:20px; padding:16px; }
.chart-box{
  height:430px;
  overflow:hidden;
  border-radius:12px;
  background:#101010;
  border:1px solid #202020;
}
.item{
  background:#141414;
  border:1px solid #242424;
  border-radius:12px;
  padding:14px;
}
.item-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.item-title{ font-size:16px; font-weight:900; }
.item-sub{ color:#a3a3a3; font-size:12px; margin-top:4px; }
.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.03em;
  border:1px solid transparent;
}
.badge.pending{ background:#2b2408; color:#f3d46b; border-color:#5a4a14; }
.badge.approved{ background:#0b2a16; color:#5ef0a0; border-color:#1e5c37; }
.badge.rejected{ background:#2a0b0b; color:#ff8a8a; border-color:#5e1d1d; }
.badge.counter_offer{ background:#241c0b; color:#f5c96b; border-color:#6c5216; }
.badge.default{ background:#1b1b1b; color:#ccc; border-color:#333; }
.item-actions{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:12px;
}
.item-actions.three{ grid-template-columns:repeat(3,1fr); }
.detail{ margin-top:10px; padding-top:10px; border-top:1px solid #242424; }
.msg{
  background:#0f0f0f;
  border:1px solid #242424;
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:8px;
}
.msg.admin{ border-color:#5a4a14; }
.msg.client{ border-color:#234b7c; }
.msg-meta{ font-size:11px; color:#888; margin-bottom:4px; }
.msg-text{ font-size:14px; color:#e8e8e8; white-space:pre-wrap; word-break:break-word; }
.tabs{ display:flex; gap:10px; flex-wrap:wrap; }
.tab-btn{
  width:auto;
  padding:10px 14px;
  border-radius:999px;
  background:#151515;
  color:#ddd;
  border:1px solid #2a2a2a;
}
.tab-btn.active{ background:var(--gold); color:#000; border-color:transparent; }
.tab-panel{ display:none; }
.tab-panel.active{ display:block; }
.form-row{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.mobile-backdrop{ display:none; }
@media (max-width: 980px){
  body{ overflow:auto; }
  .menu-btn{ display:inline-flex; align-items:center; justify-content:center; }
  .layout{ grid-template-columns:1fr; height:auto; min-height:calc(100vh - 64px); }
  .sidebar{
    position:fixed;
    top:64px;
    left:-100%;
    width:min(320px, 88vw);
    height:calc(100vh - 64px);
    z-index:999;
    transition:left .25s ease;
    background:#0d0d0d;
  }
  .sidebar.active{ left:0; }
  .mobile-backdrop{
    display:block;
    position:fixed;
    inset:64px 0 0 0;
    background:rgba(0,0,0,.45);
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
    z-index:998;
  }
  .mobile-backdrop.active{ opacity:1; pointer-events:auto; }
  .main{ padding:14px; }
  .grid{ grid-template-columns:1fr; }
  .chart-box{ height:360px; }
  .actions,
  .item-actions,
  .item-actions.three,
  .form-row{ grid-template-columns:1fr; }
  .balance-box,
  .balance-label{ text-align:left; }
}
@media (max-width: 520px){
  header{ padding:0 12px; }
  .brand{ font-size:16px; }
  .logout{ padding:9px 12px; }
  .main{ padding:12px; }
  .card{ padding:14px; border-radius:12px; }
  .chart-box{ height:320px; }
}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <span class="brand">🧑‍💼 PANEL ADMINISTRACIÓN</span>
  </div>
  <button class="logout" onclick="logout()">Cerrar sesión</button>
</header>

<div class="mobile-backdrop" id="backdrop" onclick="closeSidebar()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <input
        type="text"
        class="search"
        id="searchUsers"
        placeholder="Buscar usuario..."
        oninput="filterUsers(this.value)"
      />
    </div>

    <div class="users-wrap" id="usersList">
      <div class="loader">Cargando usuarios...</div>
    </div>
  </aside>

  <main class="main" id="profilePanel">
    <div class="center">Selecciona un usuario</div>
  </main>
</div>

<script>
const API = `${location.origin}/api`;
const token = localStorage.getItem("admin_token") || localStorage.getItem("token");

if (!token) location.href = "login.html";

function authHeaders(extra = {}) {
  return {
    ...(token ? { Authorization: "Bearer " + token } : {}),
    ...extra
  };
}

let currentUser = null;
let currentWithdraw = null;
let currentDocument = null;
let tvWidget = null;
let allUsers = [];
let allWithdraws = [];
let allDocuments = [];
let socket = null;

function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const backdrop = document.getElementById("backdrop");
  sidebar.classList.toggle("active");
  backdrop.classList.toggle("active");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("backdrop").classList.remove("active");
}

window.addEventListener("resize", () => {
  if (window.innerWidth > 980) closeSidebar();
});

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, function (m) {
    return ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    })[m];
  });
}

function formatDate(value) {
  if (!value) return "—";
  const d = new Date(value);
  return isNaN(d.getTime()) ? "—" : d.toLocaleString();
}

function formatMoney(value) {
  const n = Number(value ?? 0);
  return n.toLocaleString("en-US", { maximumFractionDigits: 2, minimumFractionDigits: 0 });
}

function statusClass(status) {
  return String(status || "default").toLowerCase().replace(/\s+/g, "_");
}

function getUserId(u) {
  return u?._id || u?.id || "";
}

function getUserEmail(u) {
  return u?.email || u?.emailAddress || u?.correo || u?.Correo || "sin-email";
}

function getUserName(u) {
  return u?.nombre || u?.name || u?.fullName || u?.firstName || u?.Nombre || u?.nombreCompleto || "";
}

function getUserPhone(u) {
  return u?.telefono || u?.phone || u?.mobile || u?.Telefono || "";
}

function getUserAddress(u) {
  return u?.direccion || u?.address || u?.Direccion || "";
}

function extractArray(resp) {
  if (!resp) return [];
  if (Array.isArray(resp)) return resp;
  if (Array.isArray(resp.data)) return resp.data;
  if (Array.isArray(resp.items)) return resp.items;
  if (Array.isArray(resp.withdraws)) return resp.withdraws;
  if (Array.isArray(resp.withdrawals)) return resp.withdrawals;
  if (Array.isArray(resp.documents)) return resp.documents;
  if (Array.isArray(resp.users)) return resp.users;
  if (Array.isArray(resp.result)) return resp.result;
  return [];
}

function firstDefined(...values) {
  for (const value of values) {
    if (value !== undefined && value !== null && value !== "") return value;
  }
  return undefined;
}

function normalizeStatusLabel(value) {
  const s = String(value || "pending").trim().toLowerCase();
  if (["pendiente", "pending"].includes(s)) return "pending";
  if (["aprobado", "approved", "approved "].includes(s)) return "approved";
  if (["rechazado", "rejected"].includes(s)) return "rejected";
  if (["counter_offer", "counter offer", "contraoferta"].includes(s)) return "counter_offer";
  return s.replace(/\s+/g, "_") || "pending";
}

function getOwnerUserId(record = {}) {
  return String(firstDefined(
    record.userId,
    record.userID,
    record.user,
    record.usuario,
    record.ownerId,
    record.clientId,
    record.client,
    record.uid,
    ""
  ));
}

function normalizeWithdrawItem(w = {}) {
  const status = normalizeStatusLabel(firstDefined(
    w.status,
    w.Estado,
    w.estado,
    w.Status,
    "pending"
  ));

  const amount = Number(firstDefined(
    w.amount,
    w.Amount,
    w.cantidad,
    w.Cantidad,
    0
  )) || 0;

  return {
    ...w,
    status,
    amount,
    method: String(firstDefined(w.method, w.metodo, w.Metodo, w.paymentMethod, "N/A")),
    walletAddress: String(firstDefined(w.walletAddress, w.wallet, w.direccionWallet, w.proofUrl, "")),
    bankName: String(firstDefined(w.bankName, w.banco, "—")),
    accountNumber: String(firstDefined(w.accountNumber, w.account, w.cuenta, w.Cuenta, "—")),
    note: String(firstDefined(w.note, w.Nota, w.message, "")),
    adminNote: String(firstDefined(w.adminNote, w.adminnote, w.admin_note, "")),
    processedBy: String(firstDefined(w.processedBy, w.procesadoPor, "")),
    processedAt: firstDefined(w.processedAt, w.procesadoAt, w.actualizadoAt, w.updatedAt, null),
    createdAt: firstDefined(w.createdAt, w.created_at, null),
    messages: Array.isArray(w.messages) ? w.messages : [],
    offerAmount: Number(firstDefined(w.offerAmount, w.counterOffer, w.oferta, 0)) || 0,
    proofUrl: String(firstDefined(w.proofUrl, w.fileUrl, w.documentUrl, w.url, w.path, "")),
    account: String(firstDefined(w.account, w.Cuenta, w.cuenta, "")),
    Cuenta: String(firstDefined(w.Cuenta, w.account, w.cuenta, "")),
    Estado: String(firstDefined(w.Estado, w.status, w.estado, "pending"))
  };
}

function normalizeDocumentItem(doc = {}) {
  const status = normalizeStatusLabel(firstDefined(
    doc.status,
    doc.Estado,
    doc.estado,
    doc.Status,
    "pending"
  ));

  const type = String(firstDefined(
    doc.type,
    doc.Tipo,
    doc.tipo,
    doc.documentType,
    doc.DocumentType,
    "documento"
  ));

  const fileUrl = String(firstDefined(
    doc.fileUrl,
    doc.documentUrl,
    doc.url,
    doc.path,
    doc.archivo,
    doc.ruta,
    doc.proofUrl,
    ""
  ));

  const fileName = String(firstDefined(
    doc.originalName,
    doc.filename,
    doc.nombre,
    doc.fileName,
    doc.name,
    "archivo"
  ));

  const mimeType = String(firstDefined(doc.mimeType, doc.mime, "—"));
  const size = Number(firstDefined(doc.size, doc.fileSize, doc.tamaño, 0)) || 0;

  return {
    ...doc,
    status,
    type,
    fileUrl,
    fileName,
    mimeType,
    size,
    createdAt: firstDefined(doc.createdAt, doc.created_at, null),
    updatedAt: firstDefined(doc.updatedAt, doc.actualizadoAt, doc.updated_at, null),
    adminNote: String(firstDefined(doc.adminNote, doc.adminnote, doc.notaAdmin, "")),
    Tipo: String(firstDefined(doc.Tipo, doc.type, type)),
    Estado: String(firstDefined(doc.Estado, doc.status, status)),
    documentUrl: String(firstDefined(doc.documentUrl, fileUrl)),
    actualizadoAt: firstDefined(doc.actualizadoAt, doc.updatedAt, null)
  };
}

function setTab(tabName) {
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tabName));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === tabName));
}

async function apiFetch(url, options = {}) {
  const opt = { ...options, headers: authHeaders(options.headers || {}) };

  if (options.body instanceof FormData) {
    delete opt.headers["Content-Type"];
  } else {
    opt.headers["Content-Type"] = opt.headers["Content-Type"] || "application/json";
  }

  const res = await fetch(url, opt);

  if (res.status === 401) {
    logout();
    return null;
  }

  if (res.status === 204) return {};

  const ct = res.headers.get("content-type") || "";
  let data = null;

  try {
    data = ct.includes("application/json") ? await res.json() : await res.text();
  } catch {
    data = null;
  }

  if (!res.ok) {
    throw new Error(typeof data === "string" ? data : (data?.msg || data?.message || res.statusText || "Error"));
  }

  return data;
}

function toast(message) {
  alert(message);
}

function connectSocket() {
  try {
    socket = io({ transports: ["websocket", "polling"], query: { role: "admin" } });

    socket.on("connect", () => {
      console.log("socket connected", socket.id);

      socket.emit("join_admin");
      socket.emit("join_admin_room"); // compatibilidad si tu cliente viejo usaba este nombre

      socket.emit("request_withdraws", { status: "all" });
      socket.emit("request_documents", { status: "all" });

      if (currentUser) {
        const userId = getUserId(currentUser);
        socket.emit("request_withdraws", { userId, status: "all" });
        socket.emit("request_documents", { userId, status: "all" });
      }
    });

    const refreshWithdrawsForCurrent = () => {
      if (currentUser) loadWithdraws(getUserId(currentUser), true);
      loadAllWithdraws(false);
    };

    const refreshDocumentsForCurrent = () => {
      if (currentUser) loadDocuments(getUserId(currentUser), true);
      loadAllDocuments(false);
    };

    socket.on("withdraw:new", refreshWithdrawsForCurrent);
    socket.on("admin:new-withdraw", refreshWithdrawsForCurrent);
    socket.on("admin:withdraw-update", (withdraw) => {
      const normalized = normalizeWithdrawItem(withdraw || {});
      if (currentWithdraw && String(currentWithdraw._id) === String(normalized._id)) {
        currentWithdraw = normalized;
        openWithdrawDetail(normalized);
      }
      refreshWithdrawsForCurrent();
    });
    socket.on("admin:withdraw-response", refreshWithdrawsForCurrent);
    socket.on("withdraw:update", (withdraw) => {
      const normalized = normalizeWithdrawItem(withdraw || {});
      if (currentWithdraw && String(currentWithdraw._id) === String(normalized._id)) {
        currentWithdraw = normalized;
        openWithdrawDetail(normalized);
      }
      refreshWithdrawsForCurrent();
    });

    socket.on("document:new", refreshDocumentsForCurrent);
    socket.on("admin:document:new", refreshDocumentsForCurrent);
    socket.on("document:uploaded", refreshDocumentsForCurrent);
    socket.on("document:approved", refreshDocumentsForCurrent);
    socket.on("document:rejected", refreshDocumentsForCurrent);
    socket.on("document:update", refreshDocumentsForCurrent);

  } catch (e) {
    console.warn("socket init failed:", e);
  }
}

async function loadUsers() {
  const list = document.getElementById("usersList");
  list.innerHTML = `<div class="loader">Cargando...</div>`;

  try {
    const resp = await apiFetch(API + "/admin/users");
    allUsers = extractArray(resp);
    renderUsers(allUsers);
  } catch (e) {
    list.innerHTML = `<div class="error">Error cargando usuarios</div>`;
  }
}

function renderUsers(users) {
  const list = document.getElementById("usersList");
  list.innerHTML = "";

  if (!users.length) {
    list.innerHTML = `<div class="center">No hay usuarios</div>`;
    return;
  }

  users.forEach(u => {
    const email = getUserEmail(u);
    const name = getUserName(u);
    const bal = typeof u.balance !== "undefined" ? u.balance : 0;

    const item = document.createElement("div");
    item.className = "user-item";
    item.innerHTML = `
      <div class="user-name">${escapeHtml(name || email)}</div>
      <div class="user-email">${escapeHtml(email)}</div>
      <div class="user-meta">
        <span>Saldo: ${escapeHtml(formatMoney(bal))}</span>
        <span>x${escapeHtml(String(typeof u.leverage !== "undefined" ? u.leverage : 1))}</span>
      </div>
    `;

    item.onclick = () => {
      openUser(u);
      if (window.innerWidth <= 980) closeSidebar();
    };

    list.appendChild(item);
  });
}

function filterUsers(text) {
  const t = String(text || "").toLowerCase().trim();
  if (!t) return renderUsers(allUsers);

  const filtered = allUsers.filter(u => {
    const values = [
      getUserName(u),
      getUserEmail(u),
      getUserPhone(u),
      getUserAddress(u),
      String(u.balance ?? ""),
      String(u.leverage ?? ""),
      String(u.role ?? "")
    ].join(" ").toLowerCase();

    return values.includes(t);
  });

  renderUsers(filtered);
}

function openUser(u) {
  currentUser = u;
  currentWithdraw = null;
  currentDocument = null;

  const userId = getUserId(u);
  const userEmail = getUserEmail(u);
  const userName = getUserName(u);
  const userPhone = getUserPhone(u);
  const userAddress = getUserAddress(u);

function loadChart() {

      container_id: "tv_chart",
      symbol,
      interval: "15",
      timezone: "Etc/UTC",
      theme: "dark",
      style: "1",

async function loadWithdraws(userId, render = true) {
  if (!userId) return [];

  const endpoints = [
    API + "/admin/withdraws/" + encodeURIComponent(userId) + "?status=all",
    API + "/admin/withdrawals/" + encodeURIComponent(userId) + "?status=all",
    API + "/admin/withdraws?userId=" + encodeURIComponent(userId) + "&status=all",
    API + "/admin/withdrawals?userId=" + encodeURIComponent(userId) + "&status=all",
    API + "/admin/withdraws?userId=" + encodeURIComponent(userId) + "&status=pending"
  ];

  let lastList = [];

  for (const url of endpoints) {
    try {
      const data = await apiFetch(url);
      const list = extractArray(data).map(normalizeWithdrawItem);
      lastList = list;

      if (list.length || Array.isArray(data)) {
        allWithdraws = list || [];
        if (render) renderWithdrawList(allWithdraws);
        return allWithdraws;
      }
    } catch {}
  }

  try {
    const data = await apiFetch(API + "/admin/withdraws?status=all");
    const list = extractArray(data).map(normalizeWithdrawItem);
    lastList = list;
    allWithdraws = list.filter(w => String(getOwnerUserId(w)) === String(userId));
    if (render) renderWithdrawList(allWithdraws);
    return allWithdraws;
  } catch {}

  allWithdraws = lastList || [];
  if (render) renderWithdrawList(allWithdraws);
  return allWithdraws;
}

async function loadAllWithdraws(render = true) {
  try {
    const endpoints = [
      API + "/admin/withdraws?status=all",

      try {
        const data = await apiFetch(url);
        const list = extractArray(data).map(normalizeWithdrawItem);

            const uid = String(getUserId(currentUser));
            renderWithdrawList(allWithdraws.filter(w => String(getOwnerUserId(w)) === uid));
          } else {
            renderWithdrawList(allWithdraws);
          }
        }

        return allWithdraws;
      } catch {}
    }

    return [];
  } catch {
    return [];
  }
}

async function sendWithdrawMessage(id) {
  const adminMessage =
    document.getElementById("withdrawMessage")?.value || "";

  if (!adminMessage.trim()) {
    return alert("Escribe un mensaje");
  }

  try {
    const endpoints = [
      API + "/admin/withdraw/message",
      API + "/admin/withdraws/message",
      API + "/admin/message-withdraw"
    ];

    let ok = false;

    for (const url of endpoints) {
      try {
        await apiFetch(url, {
          method: "POST",
          body: JSON.stringify({
            id,
            adminMessage
          })
        });

        ok = true;
        break;
      } catch (err) {
        console.log("Ruta falló:", url);
      }
    }

    if (!ok) {
      return alert("No existe ruta de mensajes en backend");
    }

    document.getElementById("withdrawMessage").value = "";

    if (currentUser) {
      await loadWithdraws(getUserId(currentUser), true);
    }

    const refreshed = allWithdraws.find(
      w => String(w._id) === String(id)
    );

    if (refreshed) {
      openWithdrawDetail(refreshed);
    }

    toast("Mensaje enviado");
  } catch (e) {
    console.error(e);
    toast("Error enviando mensaje");
  }
}

async function sendCounterOffer(id) {
  const offerAmount = Number(document.getElementById("counterAmount")?.value || 0);
  const adminNote = document.getElementById("counterNote")?.value || "";

  if (!Number.isFinite(offerAmount) || offerAmount < 0) return alert("Monto inválido");

  try {
    await apiFetch(API + "/admin/withdraw/counter", {
      method: "POST",
      body: JSON.stringify({ id, offerAmount, adminNote })
    });

    if (currentUser) await loadWithdraws(getUserId(currentUser), true);

    const refreshed = allWithdraws.find(w => String(w._id) === String(id));
    if (refreshed) openWithdrawDetail(refreshed);
    toast("Contraoferta enviada");
  } catch (e) {
    console.error(e);
    toast("Error creando contraoferta");
  }
}

      </div>

      <div class="item-actions">
        <button class="success" onclick="approveDocument('${d._id || ""}')">Aprobar</button>
        <button class="danger" onclick="rejectDocument('${d._id || ""}')">Rechazar</button>
      </div>
    </div>
  `;
}

async function approveDocument(id) {
  const note = document.getElementById("docAdminNote")?.value || "";
  try {
    const endpoints = [
      API + "/admin/document/approve",
      API + "/admin/documents/approve"
    ];

    let ok = false;
    for (const url of endpoints) {
      try {
        await apiFetch(url, { method: "POST", body: JSON.stringify({ id, note }) });
        ok = true;
        break;
      } catch {}
    }

    if (ok) {
      if (currentUser) await loadDocuments(getUserId(currentUser), true);
      const refreshed = allDocuments.find(d => String(d._id) === String(id));
      if (refreshed) openDocumentDetail({ ...refreshed, adminNote: note, status: "approved" });
      toast("Documento aprobado");
    } else {
      toast("No existe la ruta de aprobar documento en el backend");
    }
  } catch (e) {
    console.error(e);
    toast("Error aprobando documento");
  }
}

async function rejectDocument(id) {
  const note = document.getElementById("docAdminNote")?.value || "";
  try {
    const endpoints = [
      API + "/admin/document/reject",
      API + "/admin/documents/reject"
    ];

    let ok = false;
    for (const url of endpoints) {
      try {
        await apiFetch(url, { method: "POST", body: JSON.stringify({ id, note }) });
        ok = true;
        break;
      } catch {}
    }

    if (ok) {

      const refreshed = allDocuments.find(d => String(d._id) === String(id));
      if (refreshed) openDocumentDetail({ ...refreshed, adminNote: note, status: "rejected" });
      toast("Documento rechazado");
    } else {
      toast("No existe la ruta de rechazar documento en el backend");
    }
  } catch (e) {
    console.error(e);
    toast("Error rechazando documento");
  }
}

async function uploadDocumentForUser() {
  if (!currentUser) return alert("Selecciona un usuario primero");

  const file = document.getElementById("docFile")?.files?.[0];
  const type = document.getElementById("docType")?.value || "other";

  if (!file) return alert("Selecciona un archivo");

  const fd = new FormData();
  fd.append("userId", getUserId(currentUser));
  fd.append("type", type);
  fd.append("document", file);

  try {
    const endpoints = [
      API + "/admin/upload-document",
      API + "/upload-document",
      API + "/documents",
      API + "/documents/upload"
    ];

    let ok = false;

    for (const url of endpoints) {
      try {
        await apiFetch(url, { method: "POST", body: fd });
        ok = true;
        break;
      } catch {}
    }

    if (ok) {
      await loadDocuments(getUserId(currentUser), true);
      toast("Documento subido");
    } else {
      toast("No existe una ruta de subida de documentos compatible en tu backend");
    }
  } catch (e) {
    console.error(e);
    toast("Error subiendo documento");
  }
}

async function refreshCurrentData() {
  if (!currentUser) return;
  await loadWithdraws(getUserId(currentUser), true);
  await loadDocuments(getUserId(currentUser), true);
}

function logout() {
  localStorage.removeItem("admin_token");
  localStorage.removeItem("token");
  location.href = "login.html";
}

connectSocket();
loadUsers();
</script>
